<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walk Planner</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org; connect-src 'self' https://api.open-meteo.com https://marine-api.open-meteo.com;">
</head>
<body>
    <div id="list-view" class="view-container">
        <main class="panel-container glassmorphism">
            <header class="header header-main">
                <h1>Walk Planner</h1>
                <img src="icon.png" alt="Walk Planner Icon" class="header-icon">
            </header>

            <section class="walk-list-section">
                <ul id="walks-list" class="walks-list">
                    <!-- Walks will be rendered here -->
                </ul>
                <div style="margin-top: 16px;">
                    <button type="button" id="add-walk-btn" class="btn btn-primary" style="width: 100%;">Add New Walk</button>
                </div>
                
                <div id="global-fetch-tracker" class="fetch-tracker" onclick="triggerGlobalUpdate()">
                    Initializing parameter sweeps... [Update]
                </div>
                
                <div class="data-actions" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 10px;">
                    <button type="button" class="btn btn-secondary layout-route-trigger" onclick="document.getElementById('list-view').classList.add('hidden'); document.getElementById('settings-view').classList.remove('hidden');" style="font-size: 0.85rem;">Settings</button>
                </div>
            </section>
        </main>
    </div>

    <div id="editor-view" class="view-container hidden">
        <div id="map"></div>
        
        <div class="editor-overlay panel-container glassmorphism">
            <section class="add-walk-section">
                <h2>Add / Edit Walk</h2>
                <form id="walk-form">
                    <input type="hidden" id="walk-id">
                    <div class="form-group">
                        <label for="walk-name">Name</label>
                        <input type="text" id="walk-name" placeholder="e.g., Morning Park Stroll" required>
                    </div>

                    <div class="form-group location-group">
                        <label>Location (Click Map)</label>
                        <div class="location-display">
                            <span id="loc-lat">Lat: --</span>
                            <span id="loc-lng">Lng: --</span>
                        </div>
                    </div>
                    <div class="form-group toggle-group" style="flex-direction: row; align-items: center; gap: 10px; margin-top: 5px;">
                        <input type="checkbox" id="is-beach" style="width: auto; transform: scale(1.2);">
                        <label for="is-beach" style="font-size: 0.95rem; margin: 0; cursor: pointer; color: white;">This is a beach walk</label>
                    </div>
                    <div class="form-actions" style="margin-top: 10px;">
                        <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
                        <button type="button" class="btn btn-danger hidden" id="editor-delete-btn">Delete</button>
                        <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
                    </div>
                </form>
            </section>
        </div>
    </div>

    <!-- Settings View -->
    <div id="settings-view" class="view-container hidden">
        <div class="panel-container glassmorphism" style="padding: 30px;">
            <header class="header" style="margin-bottom: 5px; text-align: center;">
                <h1 style="font-size: 1.5rem;">Settings</h1>
            </header>
            <div id="app-version" style="text-align: center; margin-bottom: 24px; font-size: 0.8rem; color: var(--text-muted); opacity: 0.8;">v1.2.0</div>
            <section class="settings-section">
                <!-- Go/No-Go Parameters -->
                <div class="settings-group" style="margin-bottom: 30px;">
                    <h2 style="font-size: 1.1rem; margin-bottom: 15px; color: var(--text-main);">Walk Parameters</h2>
                    <div class="settings-grid">
                        <div class="form-group">
                            <label for="set-temp-min">Min Feels Like Temp (°F)</label>
                            <input type="number" id="set-temp-min" value="68">
                        </div>
                        <div class="form-group">
                            <label for="set-temp-max">Max Feels Like Temp (°F)</label>
                            <input type="number" id="set-temp-max" value="80">
                        </div>
                        <div class="form-group">
                            <label for="set-wind-max">Max Wind Speed (mph)</label>
                            <input type="number" id="set-wind-max" value="15">
                        </div>
                        <div class="form-group">
                            <label for="set-tide-window">Beach Tide Window (± hours)</label>
                            <input type="number" id="set-tide-window" min="1" max="12" step="1" value="2">
                        </div>
                    </div>
                    <div class="form-group toggle-group" style="flex-direction: row; align-items: center; gap: 10px; margin-top: 15px;">
                        <input type="checkbox" id="set-no-rain" checked style="width: auto; transform: scale(1.2);">
                        <label for="set-no-rain" style="font-size: 0.95rem; margin: 0; cursor: pointer;">Require no rain</label>
                    </div>
                    <div class="form-group toggle-group" style="flex-direction: row; align-items: center; gap: 10px; margin-top: 10px;">
                        <input type="checkbox" id="set-notifications" style="width: auto; transform: scale(1.2);">
                        <label for="set-notifications" style="font-size: 0.95rem; margin: 0; cursor: pointer;">Enable Notifications</label>
                    </div>
                </div>

                <div class="settings-nav" style="display: flex; flex-direction: column; gap: 10px;">
                    <button type="button" id="manage-data-btn" class="btn btn-secondary" style="width: 100%;">Data Management</button>
                    <button type="button" id="settings-back-btn" class="btn btn-primary" style="width: 100%;">Done</button>
                </div>
            </section>
        </div>
    </div>

    <!-- Data Management View -->
    <div id="data-view" class="view-container hidden">
        <div class="panel-container glassmorphism" style="padding: 30px;">
            <header class="header" style="margin-bottom: 5px; text-align: center;">
                <h1 style="font-size: 1.5rem;">Data Management</h1>
            </header>
            <p style="text-align: center; margin-bottom: 24px; font-size: 0.9rem; color: var(--text-muted);">Backup, restore, or wipe your local app data.</p>
            
            <section class="data-section">
                <div class="data-actions" style="display: flex; flex-direction: column; gap: 15px;">
                    <button type="button" id="export-btn" class="btn btn-primary" style="font-size: 0.95rem;">Export walks and settings</button>
                    <button type="button" id="import-btn" class="btn btn-secondary" style="font-size: 0.95rem;">Import walks and settings</button>
                    <input type="file" id="import-file" accept=".json" style="display: none;">
                    
                    <div style="border-top: 1px solid rgba(255, 255, 255, 0.1); margin: 10px 0;"></div>
                    
                    <button type="button" id="delete-all-btn" class="btn btn-danger" style="font-size: 0.95rem;">Delete all walks and settings</button>
                </div>
                
                <div style="margin-top: 30px;">
                    <button type="button" id="data-back-btn" class="btn btn-secondary" style="width: 100%;">Back</button>
                </div>
            </section>
        </div>
    </div>

    <!-- Info View -->
    <div id="info-view" class="view-container hidden">
        <div class="panel-container glassmorphism info-panel">
            <header class="header">
                <h1 id="info-title">Walk Details</h1>
                <p>Live current conditions and detailed forecast.</p>
            </header>
            <section class="info-current-section" style="margin-bottom: 20px;">
                <h2 style="font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted);">Current Conditions</h2>
                <div id="info-current-body" style="background: rgba(0,0,0,0.2); border-radius: 8px; padding: 12px; margin-top: 5px; min-height: 50px;">
                    <!-- Populated via Javascript -->
                </div>
            </section>
            
            <section class="info-forecast-section">
                <h2 style="font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px;">7-Day Extended Forecast</h2>
                <div id="forecast-log" class="forecast-log">
                    <!-- Populated via Javascript -->
                </div>
            </section>

            <div class="form-actions" style="margin-top: 20px; display: flex; gap: 10px;">
                <button type="button" class="btn btn-primary" id="info-edit-btn" style="flex:1;">Edit Walk</button>
                <button type="button" class="btn btn-secondary" id="info-back-btn" style="flex:1;">Back</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
